apiVersion: openchoreo.dev/v1alpha1

metadata:
  name: nsw-backend

endpoints:
  - name: api
    port: 8080
    type: HTTP
    basePath: /api/v1
    visibility:
      - external

configurations:
  files:
    - name: services.json
      mountPath: /app/configs/mounted/services.json
      valueFrom:
        secretKeyRef:
          name: services-config  
          key: services.json
  env:
    - name: SERVICES_CONFIG_PATH
      value: "/app/configs/mounted/services.json"
    # Database
    - name: DB_HOST
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: host
    - name: DB_PORT
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: port
    - name: DB_USERNAME
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: username
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: password
    - name: DB_NAME
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: database
    - name: DB_SSLMODE
      value: disable
    # Server
    - name: SERVER_PORT
      value: "8080"
    - name: SERVICE_URL
      value: http://localhost:8080
    # Auth
    - name: AUTH_JWKS_URL
      value: https://localhost:8090/oauth2/jwks
    - name: AUTH_ISSUER
      value: https://localhost:8090
    - name: AUTH_CLIENT_ID
      value: TRADER_PORTAL_APP
    - name: AUTH_AUDIENCE
      value: TRADER_PORTAL_APP
    # CORS
    - name: CORS_ALLOWED_ORIGINS
      value: http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176
    # Storage
    - name: STORAGE_TYPE
      value: local
    - name: STORAGE_LOCAL_BASE_DIR
      value: /data/uploads