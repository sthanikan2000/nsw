name: Docker Validation CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'oga/**'
      - 'portals/**'
      - '.github/workflows/docker-validation.yml'

jobs:
  detect-changes:
    name: Detect Changed Build Contexts
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      oga: ${{ steps.filter.outputs.oga }}
      portals: ${{ steps.filter.outputs.portals }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            oga:
              - 'oga/**'
            portals:
              - 'portals/**'
            workflow:
              - '.github/workflows/docker-validation.yml'

  docker-validate:
    name: Validate ${{ matrix.name }} image
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            tag: nsw-backend:validate
            trigger: backend
          - name: oga-backend
            context: ./oga
            dockerfile: ./oga/Dockerfile
            tag: nsw-oga-backend:validate
            trigger: oga
          - name: trader-portal
            context: ./portals
            dockerfile: ./portals/apps/trader-app/Dockerfile
            tag: nsw-trader-portal:validate
            trigger: portals
          - name: oga-portal
            context: ./portals
            dockerfile: ./portals/apps/oga-app/Dockerfile
            tag: nsw-oga-portal:validate
            trigger: portals
    steps:
      - uses: actions/checkout@v4
        if: |
          needs.detect-changes.outputs.workflow == 'true' ||
          (matrix.trigger == 'backend' && needs.detect-changes.outputs.backend == 'true') ||
          (matrix.trigger == 'oga' && needs.detect-changes.outputs.oga == 'true') ||
          (matrix.trigger == 'portals' && needs.detect-changes.outputs.portals == 'true')

      - uses: docker/setup-buildx-action@v3
        if: |
          needs.detect-changes.outputs.workflow == 'true' ||
          (matrix.trigger == 'backend' && needs.detect-changes.outputs.backend == 'true') ||
          (matrix.trigger == 'oga' && needs.detect-changes.outputs.oga == 'true') ||
          (matrix.trigger == 'portals' && needs.detect-changes.outputs.portals == 'true')

      - name: Build ${{ matrix.name }} image
        if: |
          needs.detect-changes.outputs.workflow == 'true' ||
          (matrix.trigger == 'backend' && needs.detect-changes.outputs.backend == 'true') ||
          (matrix.trigger == 'oga' && needs.detect-changes.outputs.oga == 'true') ||
          (matrix.trigger == 'portals' && needs.detect-changes.outputs.portals == 'true')
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
