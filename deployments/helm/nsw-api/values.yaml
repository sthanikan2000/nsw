global:
  clusterDomain: ""
  namespace: ""

fullnameOverride: ""
replicaCount: 1

podSecurityContext:
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

image:
  repository: ghcr.io/opennsw/nsw-backend
  pullPolicy: IfNotPresent
  tag: 0.0.0-replace-me

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

config:
  server:
    port: 8080
    debug: false
    logLevel: "info"

  temporal:
    host: ""
    port: ""
    namespace: ""

  database:
    host: "nsw-db"
    port: 5432
    name: "nsw_db"
    username: "postgres"
    credentialsSecretName: ""
    sslMode: "require"

  auth:
    jwksUrl: ""
    issuer: ""
    audience: "NSW_API"
    clientId:
      - "TRADER_PORTAL_APP"
      - "FCAU_TO_NSW"
      - "NPQS_TO_NSW"
      - "IRD_TO_NSW"
    insecureSkipTlsVerify: false

  serviceUrl: ""

  cors:
    allowedOrigins: []

  storage:
    type: "local"
    localBaseDir: "/tmp/bucket"
    localPublicUrl: "/api/v1/uploads"
    credentialsSecretName: ""
    # S3 config — only used when storage.type is "s3"
    s3Endpoint: ""
    s3Bucket: "nsw-uploads"
    s3Region: "us-east-1"
    s3AccessKey: ""
    s3SecretKey: ""
    s3UseSsl: true
    s3PublicUrl: ""

# External service endpoints mounted as /etc/nsw/services.json inside the container.
# Example:
#   services:
#     - id: npqs
#       url: http://npqs-service:8081
#       timeout: 30s
services: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

route:
  enabled: true
  # Leave empty to let OpenShift auto-assign; set explicitly only if your user has permission.
  host: ""
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: nsw-api
          topologyKey: kubernetes.io/hostname
