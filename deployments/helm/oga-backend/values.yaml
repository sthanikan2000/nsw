# Default values for oga-backend.
global:
  clusterDomain: ""
  namespace: ""

fullnameOverride: ""
replicaCount: 1
# This is a base file for the three OGA agency deployments.

image:
  repository: ghcr.io/opennsw/oga-backend
  pullPolicy: IfNotPresent
  tag: 0.0.0-replace-me

config:
  port: 8081
  database:
    driver: postgres
    host: nsw-db
    port: 5432
    sslMode: disable
    credentialsSecretName: ""
  defaultFormId: default
  nswApiBaseUrl: ""
  # Specific to each agency (should be overridden)
  nswClientId: ""
  nswClientSecret: ""
  nswTokenUrl: ""
  allowedOrigins: ""

route:
  enabled: false
  host: ""
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

migrations:
  enabled: false
  image:
    repository: registry.developers.crunchydata.com/crunchydata/crunchy-postgres
    tag: "ubi8-15.4-0"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: oga-backend
          topologyKey: kubernetes.io/hostname
