{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "oga-backend.fullname" . }}-migration-{{ .Release.Revision }}
  labels:
    {{- include "oga-backend.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      name: {{ include "oga-backend.fullname" . }}-migration
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: OnFailure
      containers:
        - name: run-migrations
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          image: "{{ .Values.migrations.image.repository }}{{ if .Values.migrations.image.tag }}:{{ .Values.migrations.image.tag }}{{ end }}"
          imagePullPolicy: {{ .Values.migrations.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: PGHOST
              value: {{ .Values.config.database.host | quote }}
            - name: PGPORT
              value: {{ .Values.config.database.port | quote }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.database.credentialsSecretName | default (printf "%s-db-credentials" .Release.Name) }}
                  key: {{ .Values.config.database.userKey | default "user" }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.database.credentialsSecretName | default (printf "%s-db-credentials" .Release.Name) }}
                  key: password
            - name: PGDATABASE
              value: {{ .Values.config.database.name | quote }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
{{- end }}
